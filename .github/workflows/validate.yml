name: Validate

on:
  push:
    branches: [ '!main', 'v[0-9]+', 'v[0-9]+.[0-9]+' ]
    tags-ignore: [ 'v[0-9]+.[0-9]+.[0-9]+' ]
  pull_request:

jobs:
  validate:
    uses: anthochamp/dev-toolbox/.github/workflows/node-validate.yml@721ccc9b2abd329f4e09a33670ffd6c83937ecc7
    with:
      node-package-manager: 'yarn'
