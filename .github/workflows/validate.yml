name: Validate

on:
  push:
    branches: [ '!main', 'v[0-9]+', 'v[0-9]+.[0-9]+' ]
    tags-ignore: [ 'v[0-9]+.[0-9]+.[0-9]+' ]
  pull_request:

jobs:
  validate:
    uses: anthochamp/dev-toolbox/.github/workflows/node-validate.yml@e474068fbd4365e99e0ff6dff8723c044ee417a2
    with:
      node-package-manager: 'yarn'
