name: Publish Package and Docs

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Publish in dry-run mode (no actual publishing or GitHub Release)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  validate:
    uses: anthochamp/dev-toolbox/.github/workflows/node-validate.yml@main
    with:
      node-package-manager: "yarn"

  publish:
    needs: validate
    uses: anthochamp/dev-toolbox/.github/workflows/node-lib-publish.yml@main
    with:
      node-package-manager: yarn
      dry-run: ${{ inputs.dry-run == 'true' }}
    secrets:
      npm-token: ${{ secrets.NPM_TOKEN }}

  generate_and_publish_doc:
    permissions:
      contents: write
      pages: write
    needs: publish
    runs-on: ubuntu-latest
    if: inputs.dry-run != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install and enable corepack
        run: |
          npm install -g corepack
          corepack enable
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: yarn install
      - name: Build docs for all packages
        run: |
          yarn run build-doc
      - name: Prepare docs for GitHub Pages
        run: |
          mkdir gh-pages
          # Prepare docs for all packages
          for pkg_dir in $(yarn workspaces list --json | jq -r '.location'); do
            pkg=$(basename "$pkg_dir")
            if [ -d "$pkg_dir/doc/generated" ]; then
              mkdir -p "gh-pages/$pkg"
              cp -r "$pkg_dir/doc/generated/." "gh-pages/$pkg/"
            fi
          done
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true

  release:
    permissions:
      contents: write
    needs: publish
    runs-on: ubuntu-latest
    if: ${{ inputs.dry-run != 'true' && needs.publish.outputs.published-tags != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Create GitHub Release for each published package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_TAGS: ${{ needs.publish.outputs.published-tags }}
        run: |
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            gh release create "$TAG" --title "$TAG" --generate-notes
          done <<< "$PUBLISHED_TAGS"
